<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9d174d"/>
      <stop offset="100%" stop-color="#500724"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer double ring -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="url(#rim)" stroke-width="4"/>
  <circle cx="40" cy="40" r="35" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.5"/>
  <circle cx="40" cy="40" r="34" fill="url(#bg)"/>
  <!-- Trident symbol -->
  <path d="M40 18 L40 58" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M30 24 L30 38" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 24 L50 38" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
  <path d="M30 24 Q30 18 40 18 Q50 18 50 24" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Stars -->
  <circle cx="24" cy="40" r="3" fill="#f472b6" filter="url(#glow)" opacity="0.8"/>
  <circle cx="56" cy="40" r="3" fill="#f472b6" filter="url(#glow)" opacity="0.8"/>
  <circle cx="40" cy="40" r="29" fill="none" stroke="#ec4899" stroke-width="0.5" stroke-dasharray="2 5"/>
  <text x="40" y="72" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="9" fill="#fbcfe8">NATIONAL</text>
  <polygon points="40,6 43,10 40,9 37,10" fill="#f472b6" filter="url(#glow)"/>
</svg>
