<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#fce7f3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#be185d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer aura (pulsing pink) -->
  <ellipse cx="60" cy="64" rx="55" ry="58" fill="rgba(236,72,153,0.18)" filter="url(#glow)"/>
  <ellipse cx="60" cy="64" rx="48" ry="52" fill="rgba(236,72,153,0.08)"/>

  <!-- Large wing shapes -->
  <path d="M25 64 Q4 46 8 18 L18 38 Q20 56 28 60 Z" fill="rgba(249,168,212,0.35)"/>
  <path d="M95 64 Q116 46 112 18 L102 38 Q100 56 92 60 Z" fill="rgba(249,168,212,0.35)"/>
  <!-- Wing details -->
  <path d="M12 52 Q6 42 10 30 L16 42 Z" fill="rgba(249,168,212,0.2)"/>
  <path d="M108 52 Q114 42 110 30 L104 42 Z" fill="rgba(249,168,212,0.2)"/>

  <!-- Trident at top -->
  <!-- Trident pole -->
  <rect x="58.5" y="2" width="3" height="20" rx="1.5" fill="#ec4899" stroke="#f9a8d4" stroke-width="0.5"/>
  <!-- Trident prongs -->
  <rect x="46" y="2" width="2.5" height="12" rx="1.25" fill="#ec4899" stroke="#f9a8d4" stroke-width="0.5"/>
  <rect x="71.5" y="2" width="2.5" height="12" rx="1.25" fill="#ec4899" stroke="#f9a8d4" stroke-width="0.5"/>
  <!-- Prong tips -->
  <polygon points="47.25,2 49,0 50.75,2" fill="#fce7f3"/>
  <polygon points="60,0 61.5,3 58.5,3" fill="#fce7f3"/>
  <polygon points="72.75,2 74.5,0 76.25,2" fill="#fce7f3"/>
  <!-- Cross bar on trident -->
  <rect x="47" y="10" width="26" height="1.5" rx="0.75" fill="#f9a8d4" stroke-width="0.3"/>

  <!-- Shield body -->
  <path d="M60 16 L95 28 L95 68 Q95 90 60 112 Q25 90 25 68 L25 28 Z"
        fill="url(#shieldGrad)" stroke="#f9a8d4" stroke-width="2.2"/>

  <!-- Shine overlay -->
  <path d="M60 16 L95 28 L95 68 Q95 90 60 112 Q25 90 25 68 L25 28 Z"
        fill="url(#shine)"/>

  <!-- Inner border (ornate, triple) -->
  <path d="M60 24 L87 35 L87 67 Q87 85 60 105 Q33 85 33 67 L33 35 Z"
        fill="none" stroke="rgba(252,231,243,0.35)" stroke-width="1.2"/>
  <path d="M60 28 L83 38 L83 66 Q83 83 60 101 Q37 83 37 66 L37 38 Z"
        fill="none" stroke="rgba(252,231,243,0.15)" stroke-width="0.6"/>

  <!-- Top arch accent -->
  <path d="M40 42 Q60 35 80 42" fill="none" stroke="rgba(252,231,243,0.25)" stroke-width="0.8"/>

  <!-- Side ornate diamonds -->
  <polygon points="14,62 20,56 26,62 20,68" fill="rgba(249,168,212,0.7)" stroke="rgba(252,231,243,0.6)" stroke-width="0.8"/>
  <polygon points="106,62 100,56 94,62 100,68" fill="rgba(249,168,212,0.7)" stroke="rgba(252,231,243,0.6)" stroke-width="0.8"/>
  <!-- Medium side diamonds -->
  <polygon points="14,76 18,72 22,76 18,80" fill="rgba(249,168,212,0.45)"/>
  <polygon points="106,76 102,72 98,76 102,80" fill="rgba(249,168,212,0.45)"/>
  <!-- Small upper dots -->
  <circle cx="20" cy="50" r="2" fill="rgba(249,168,212,0.5)"/>
  <circle cx="100" cy="50" r="2" fill="rgba(249,168,212,0.5)"/>
  <circle cx="16" cy="88" r="1.5" fill="rgba(249,168,212,0.35)"/>
  <circle cx="104" cy="88" r="1.5" fill="rgba(249,168,212,0.35)"/>

  <!-- Star top decoration -->
  <polygon points="60,18 61.5,22 65.5,22 62.5,24.5 63.5,28.5 60,26.5 56.5,28.5 57.5,24.5 54.5,22 58.5,22" fill="rgba(252,231,243,0.5)"/>

  <!-- Rank letter -->
  <text x="60" y="67" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="40" font-weight="900" fill="rgba(255,240,250,0.96)">G</text>

  <!-- Rank name -->
  <text x="60" y="94" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="7" font-weight="700"
        fill="rgba(252,231,243,0.7)" letter-spacing="1.5">NATIONAL</text>
</svg>
