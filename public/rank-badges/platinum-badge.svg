<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e7a8a"/>
      <stop offset="100%" stop-color="#064e5a"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="40" cy="40" r="38" fill="none" stroke="url(#rim)" stroke-width="3.5"/>
  <circle cx="40" cy="40" r="34" fill="url(#bg)"/>
  <!-- Double ring -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 3"/>
  <circle cx="40" cy="40" r="26" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
  <!-- Crystal decoration -->
  <polygon points="40,16 46,28 58,28 48,36 52,50 40,42 28,50 32,36 22,28 34,28" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
  <path d="M40 18 L56 24 L56 42 Q56 56 40 62 Q24 56 24 42 L24 24 Z" fill="#0c4a5a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="40" y="46" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#67e8f9" filter="url(#glow)">B</text>
  <polygon points="40,10 44,16 40,14 36,16" fill="#22d3ee"/>
  <circle cx="40" cy="10" r="2.5" fill="#67e8f9" filter="url(#glow)"/>
