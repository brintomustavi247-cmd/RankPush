  <polygon points="40,20 50,30 50,50 40,60 30,50 30,30" fill="#4c1d95" stroke="#c084fc" stroke-width="1.5"/>
  <text x="40" y="46" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#e879f9" filter="url(#glow)">A</text>
  <polygon points="40,10 44,16 40,14 36,16" fill="#c084fc"/>
