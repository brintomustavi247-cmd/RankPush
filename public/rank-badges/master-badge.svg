<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="url(#rim)" stroke-width="4"/>
  <circle cx="40" cy="40" r="35" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <circle cx="40" cy="40" r="34" fill="url(#bg)"/>
  <!-- Crown decoration -->
  <path d="M22 46 L28 28 L34 38 L40 20 L46 38 L52 28 L58 46 Z" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="40" cy="20" r="3" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="28" cy="28" r="2.5" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="52" cy="28" r="2.5" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="40" cy="40" r="29" fill="none" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="3 5"/>
  <text x="40" y="58" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="14" fill="#fde68a" filter="url(#glow)">S</text>
  <polygon points="40,6 43,11 40,10 37,11" fill="#fbbf24" filter="url(#glow)"/>
</svg>
