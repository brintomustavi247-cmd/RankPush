<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b0b8c0"/>
      <stop offset="50%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#e5e7eb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6b7280" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="60" cy="68" rx="38" ry="42" fill="rgba(107,114,128,0.2)" filter="url(#glow)"/>

  <!-- Shield body -->
  <path d="M60 8 L95 22 L95 64 Q95 90 60 112 Q25 90 25 64 L25 22 Z"
        fill="url(#shieldGrad)" stroke="#9ca3af" stroke-width="1.8"/>

  <!-- Shine overlay -->
  <path d="M60 8 L95 22 L95 64 Q95 90 60 112 Q25 90 25 64 L25 22 Z"
        fill="url(#shine)"/>

  <!-- Inner border -->
  <path d="M60 16 L87 28 L87 63 Q87 84 60 103 Q33 84 33 63 L33 28 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Top edge accent -->
  <line x1="40" y1="38" x2="80" y2="38" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>

  <!-- Rank letter -->
  <text x="60" y="58" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="46" font-weight="900" fill="rgba(255,255,255,0.88)">E</text>

  <!-- Rank name -->
  <text x="60" y="88" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="7.5" font-weight="700"
        fill="rgba(200,210,220,0.55)" letter-spacing="2.5">E-RANK</text>
</svg>
