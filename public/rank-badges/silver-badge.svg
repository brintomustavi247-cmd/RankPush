<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="60" cy="68" rx="40" ry="44" fill="rgba(180,83,9,0.25)" filter="url(#glow)"/>

  <!-- Shield body -->
  <path d="M60 8 L95 22 L95 64 Q95 90 60 112 Q25 90 25 64 L25 22 Z"
        fill="url(#shieldGrad)" stroke="#d97706" stroke-width="1.8"/>

  <!-- Shine overlay -->
  <path d="M60 8 L95 22 L95 64 Q95 90 60 112 Q25 90 25 64 L25 22 Z"
        fill="url(#shine)"/>

  <!-- Inner border -->
  <path d="M60 16 L87 28 L87 63 Q87 84 60 103 Q33 84 33 63 L33 28 Z"
        fill="none" stroke="rgba(255,200,100,0.2)" stroke-width="1"/>

  <!-- Side accent dots -->
  <circle cx="28" cy="55" r="2.5" fill="rgba(251,191,36,0.5)"/>
  <circle cx="92" cy="55" r="2.5" fill="rgba(251,191,36,0.5)"/>

  <!-- Top crossbar -->
  <line x1="38" y1="36" x2="82" y2="36" stroke="rgba(251,191,36,0.2)" stroke-width="0.8"/>

  <!-- Rank letter -->
  <text x="60" y="58" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="46" font-weight="900" fill="rgba(255,245,220,0.92)">D</text>

  <!-- Rank name -->
  <text x="60" y="88" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="7.5" font-weight="700"
        fill="rgba(251,191,36,0.6)" letter-spacing="2.5">D-RANK</text>
</svg>
